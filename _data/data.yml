career-profile:
    title: Career Profile
    summary: |
      I am a Ph.D. student in MATRIX Lab at Department of Computational and Data Sciences at IISc, Bangalore. In my Ph.D. work, I will attempt to develop novel computational methods and efficient, scalable implementation procedures for extensions of Density Functional Theory (Eg. Spin-Orbit coupling, nonlocal functionals, GW methods) in the finite element framework. These methods will allow us to take advantage of present-day extreme-scale computing architectures and thereby use these methodologies to explore new frontiers in materials sciences, which has not been possible thus far.
