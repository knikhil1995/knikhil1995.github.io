experiences:
    title: Research Projects / Internships
    info:
      - role: HiWi (Student Assistant)
        time: 2018 - 2019
        company: Institute for Computational Physics, University of Stuttgart
        details: |
          I was responsible for performing structural optimization and energy calculations for NV centers in diamond slabs and their interactions with nucleobases using DFT.
      - role: Research Intern 
        time: 25 May 2016 - 15 July 2016
        company: Nano and Hybrid Materials group, École Polytechnique de Montréal
        details: |
          Nano and Hybrid Materials group }{École Polytechnique de Montréal}{}{\vspace{3pt}I was responsible for performing structural optimization and energy calculations for Sn/Ge/Si alloys using DFT. The results of these calculations were used to provide a qualitative understanding of atomic order in meta-stable Sn/Ge/Si alloys (Germanium supersaturated with Tin), which the group previously observed.
      - role: Summer Research Fellow
        time: 20 May 2015 - 8 July 2015
        company: Department of Condensed Matter Physics, SNBNCBS, Kolkata
        details: |
          During my work here, I performed DFT calculations on Perovskite compounds, namely SrTiO$_3$ (Spin polarised GGA), LaAlO_3 (Spin-polarized GGA), GdTiO_3(Spin-polarized GGA+U) and SmTiO<sub>3</sub> (noncolinear GGA+U with SO coupling). These calculations aimed to find a reasonable estimate for the DOS and bandgap for the bulk materials so that the parameters used in these calculations could be used for supercell calculations for understanding 2DEG formation at perovskite interfaces.
